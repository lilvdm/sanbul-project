<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>산불 예측 입력</title>
</head>
<body>
    <h1>Fill in the data</h1>

    <form action="/prediction" method="post">
        <p>longitude: <input type="text" name="longitude" required></p>
        <p>latitude: <input type="text" name="latitude" required></p>
        <p>month:
<select name="month" required>
  <option value="01-Jan">01-Jan</option>
  <option value="02-Feb">02-Feb</option>
  <option value="03-Mar">03-Mar</option>
  <option value="04-Apr">04-Apr</option>
  <option value="05-May">05-May</option>
  <option value="06-Jun">06-Jun</option>
  <option value="07-Jul">07-Jul</option>
  <option value="08-Aug">08-Aug</option>
  <option value="09-Sep">09-Sep</option>
  <option value="10-Oct">10-Oct</option>
  <option value="11-Nov">11-Nov</option>
  <option value="12-Dec">12-Dec</option>
</select>
</p>

<p>day:
<select name="day" required>
  <option value="00-sun">00-sun</option>
  <option value="01-mon">01-mon</option>
  <option value="02-tue">02-tue</option>
  <option value="03-wed">03-wed</option>
  <option value="04-thu">04-thu</option>
  <option value="05-fri">05-fri</option>
  <option value="06-sat">06-sat</option>
  <option value="07-hol">07-hol</option>
</select>
</p>
        <p>avg_temp: <input type="text" name="avg_temp" required></p>
        <p>max_temp: <input type="text" name="max_temp" required></p>
        <p>max_wind_speed: <input type="text" name="max_wind_speed" required></p>
        <p>avg_wind: <input type="text" name="avg_wind" required></p>
        <button type="submit">Submit</button>
    </form>
    <br>
    <a href="/">Home</a>
</body>
</html>
